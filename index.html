<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Dallas Golf Signage Matrix — browse, preview, and download print-ready signage for the 2026 Dallas event."
    />
    <title>Dallas Golf Signage Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a href="#content" class="skip-link">Skip to signage</a>

    <div class="app-layout">
      <aside class="sidebar" aria-label="Signage navigation">
        <header class="sidebar-header">
          <div class="sidebar-header-row">
            <h1>Dallas Golf Signage Matrix</h1>
            <button
              type="button"
              id="nav-toggle"
              class="nav-toggle"
              aria-controls="toc"
              aria-expanded="true"
            >
              <span class="nav-toggle-label">Menu</span>
            </button>
          </div>
          <label class="search-field" for="search-input">
            <span class="visually-hidden">Search signage</span>
            <svg
              class="search-icon"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              id="search-input"
              type="search"
              placeholder="Search signs or sponsors&hellip;"
              autocomplete="off"
              spellcheck="false"
            />
            <span class="search-shortcut" aria-hidden="true">/</span>
            <button
              type="button"
              id="search-clear"
              class="search-clear"
              aria-label="Clear search"
              hidden
            >
              &times;
            </button>
          </label>
          <p id="search-status" class="search-status" role="status" aria-live="polite"></p>
        </header>
        <nav id="toc" class="toc" aria-label="Table of contents"></nav>
      </aside>

      <main id="content" class="content" tabindex="-1">
        <div id="content-status" class="content-status" role="status" aria-live="polite">
          <p>Loading signage&hellip;</p>
        </div>
      </main>
    </div>

    <button
      type="button"
      id="back-to-top"
      class="back-to-top"
      aria-label="Back to top"
    >
      <span aria-hidden="true">&uarr;</span>
    </button>

    <div
      id="image-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
      aria-labelledby="modal-title"
    >
      <h2 id="modal-title" class="visually-hidden">Signage preview</h2>
      <button id="modal-close" class="modal-close" type="button" aria-label="Close preview">
        <span aria-hidden="true">&times;</span>
      </button>
      <img id="modal-image" src="" alt="" />
      <iframe id="modal-pdf" title="Signage PDF preview"></iframe>
      <a id="modal-download" class="modal-download" hidden download>
        <span aria-hidden="true">&darr;</span>
        <span>Download this sign</span>
      </a>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
