<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dallas Golf Signage Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Signage navigation">
        <header class="sidebar-header">
          <h1>Dallas Golf Signage Matrix</h1>
        </header>
        <nav id="toc" class="toc" aria-label="Table of contents"></nav>
      </aside>

      <main id="content" class="content" aria-live="polite"></main>
    </div>

    <div id="image-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
      <button id="modal-close" class="modal-close" aria-label="Close image viewer">&times;</button>
      <img id="modal-image" src="" alt="Expanded signage preview" />
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
